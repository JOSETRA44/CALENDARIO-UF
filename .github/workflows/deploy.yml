name: Deploy Calendario UF to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build
        env:
          # Public anon keys — safe to embed. Override via GitHub Variables if rotated.
          NEXT_PUBLIC_SUPABASE_URL:      ${{ vars.NEXT_PUBLIC_SUPABASE_URL      || 'https://dnzzqjrmyyvukeadsxei.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'sb_publishable_GFPo6O_15Ksls0DHQLhlJA_SGLOy7SFsb_publishable_Bo-R91ajV2EY5SjF4Anl5A_V9ESikl6' }}
          # Auto-detects /repo-name from the GitHub repository name.
          # Override by setting NEXT_PUBLIC_BASE_PATH in GitHub → Settings → Variables
          # (e.g. '' for a custom domain, or '/otro-nombre' for a different path)
          NEXT_PUBLIC_BASE_PATH: ${{ vars.NEXT_PUBLIC_BASE_PATH || format('/{0}', github.event.repository.name) }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
