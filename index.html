<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Calendario de cumpleaños y días festivos con cuenta regresiva en tiempo real." />
  <meta name="theme-color" content="#070714" />
  <title>Calendario UF | Cumpleaños y Días Festivos</title>

  <!-- Favicon inline SVG -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>" />

  <!-- Google Fonts: Inter (variable font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Particle background -->
  <canvas id="particles-canvas" aria-hidden="true"></canvas>

  <!-- ===== HEADER ===== -->
  <header class="header" role="banner">
    <div class="header__inner container">
      <div class="header__brand">
        <span class="header__icon" aria-hidden="true">📅</span>
        <span class="header__title">Calendario UF</span>
      </div>
      <time class="header__date" id="current-date" aria-live="polite" aria-label="Fecha actual"></time>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main id="main-content" role="main">

    <!-- HERO: Próximo evento -->
    <section class="hero" aria-labelledby="hero-label">
      <div class="container hero__content">
        <p class="hero__label" id="hero-label" aria-live="polite">Cargando próximo evento…</p>
        <h1 class="hero__event-name" id="hero-event-name">
          <span class="skeleton skeleton--title" aria-hidden="true"></span>
        </h1>
        <p class="hero__subtitle" id="hero-subtitle"></p>

        <!-- Cuenta regresiva principal -->
        <div class="hero__countdown" id="hero-countdown" aria-live="polite" aria-atomic="true" aria-label="Cuenta regresiva">
          <div class="countdown-unit">
            <span class="countdown-unit__value" id="cd-days">00</span>
            <span class="countdown-unit__label">Días</span>
          </div>
          <span class="countdown-sep" aria-hidden="true">:</span>
          <div class="countdown-unit">
            <span class="countdown-unit__value" id="cd-hours">00</span>
            <span class="countdown-unit__label">Horas</span>
          </div>
          <span class="countdown-sep" aria-hidden="true">:</span>
          <div class="countdown-unit">
            <span class="countdown-unit__value" id="cd-minutes">00</span>
            <span class="countdown-unit__label">Min</span>
          </div>
          <span class="countdown-sep" aria-hidden="true">:</span>
          <div class="countdown-unit">
            <span class="countdown-unit__value" id="cd-seconds">00</span>
            <span class="countdown-unit__label">Seg</span>
          </div>
        </div>
      </div>
    </section>

    <!-- UPCOMING: Scroll horizontal -->
    <section class="upcoming reveal" aria-labelledby="upcoming-title">
      <div class="container">
        <h2 class="section-title" id="upcoming-title">Próximos Eventos</h2>
        <div class="upcoming__track" id="upcoming-scroll" role="list" aria-label="Lista de próximos eventos">
          <!-- Skeletons iniciales -->
          <div class="event-card event-card--skeleton" aria-hidden="true">
            <span class="skeleton skeleton--icon"></span>
            <span class="skeleton skeleton--text"></span>
            <span class="skeleton skeleton--text skeleton--short"></span>
          </div>
          <div class="event-card event-card--skeleton" aria-hidden="true">
            <span class="skeleton skeleton--icon"></span>
            <span class="skeleton skeleton--text"></span>
            <span class="skeleton skeleton--text skeleton--short"></span>
          </div>
          <div class="event-card event-card--skeleton" aria-hidden="true">
            <span class="skeleton skeleton--icon"></span>
            <span class="skeleton skeleton--text"></span>
            <span class="skeleton skeleton--text skeleton--short"></span>
          </div>
          <div class="event-card event-card--skeleton" aria-hidden="true">
            <span class="skeleton skeleton--icon"></span>
            <span class="skeleton skeleton--text"></span>
            <span class="skeleton skeleton--text skeleton--short"></span>
          </div>
        </div>
      </div>
    </section>

    <!-- ALL EVENTS: Grid filtrable -->
    <section class="all-events reveal" aria-labelledby="all-events-title">
      <div class="container">

        <div class="all-events__header">
          <h2 class="section-title" id="all-events-title">Todos los Eventos</h2>

          <!-- Search -->
          <div class="search-bar" role="search">
            <svg class="search-bar__icon" xmlns="http://www.w3.org/2000/svg" width="17" height="17"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input
              class="search-bar__input"
              type="search"
              id="search-input"
              placeholder="Buscar evento o persona…"
              aria-label="Buscar evento"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Tabs filter -->
        <div class="tabs" role="tablist" aria-label="Filtrar por tipo de evento">
          <button class="tab tab--active" role="tab" aria-selected="true" data-tab="todos" tabindex="0">
            Todos
          </button>
          <button class="tab" role="tab" aria-selected="false" data-tab="cumpleanos" tabindex="-1">
            🎂 Cumpleaños
          </button>
          <button class="tab" role="tab" aria-selected="false" data-tab="festivos" tabindex="-1">
            🎉 Días Festivos
          </button>
        </div>

        <!-- Events grid -->
        <div class="events-grid" id="events-grid" role="list" aria-label="Eventos">
          <!-- Skeletons -->
          <div class="event-full-card event-full-card--skeleton" aria-hidden="true">
            <span class="skeleton skeleton--icon skeleton--lg"></span>
            <span class="skeleton skeleton--text"></span>
            <span class="skeleton skeleton--text skeleton--short"></span>
          </div>
          <div class="event-full-card event-full-card--skeleton" aria-hidden="true">
            <span class="skeleton skeleton--icon skeleton--lg"></span>
            <span class="skeleton skeleton--text"></span>
            <span class="skeleton skeleton--text skeleton--short"></span>
          </div>
          <div class="event-full-card event-full-card--skeleton" aria-hidden="true">
            <span class="skeleton skeleton--icon skeleton--lg"></span>
            <span class="skeleton skeleton--text"></span>
            <span class="skeleton skeleton--text skeleton--short"></span>
          </div>
          <div class="event-full-card event-full-card--skeleton" aria-hidden="true">
            <span class="skeleton skeleton--icon skeleton--lg"></span>
            <span class="skeleton skeleton--text"></span>
            <span class="skeleton skeleton--text skeleton--short"></span>
          </div>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="empty-state" hidden aria-live="polite">
          <div class="empty-state__icon" aria-hidden="true">🔍</div>
          <p class="empty-state__text">No se encontraron eventos</p>
          <p class="empty-state__sub">Intenta con otro término o revisa los filtros</p>
        </div>

      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer" role="contentinfo">
    <div class="container footer__inner">
      <p class="footer__text">Calendario UF &copy; <span id="footer-year"></span></p>
      <p class="footer__text footer__text--muted">Los datos se actualizan automáticamente</p>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
